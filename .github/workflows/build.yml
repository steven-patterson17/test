name: SonarCloud Analysis

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonar:
    name: Analyze Unity Scripts with SonarCloud
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 7.0.x

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Add .NET tools to PATH
        shell: powershell
        run: echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

      - name: SonarCloud Begin
        shell: powershell
        run: |
          dotnet-sonarscanner begin `
            /k:"steven-patterson17_Vr_Training_Application" `
            /o:"steven-patterson17" `
            /d:sonar.host.url="https://sonarcloud.io" `
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" `
            /d:sonar.sources="Assets" `
            /d:sonar.exclusions="**/Library/**,**/Temp/**,**/Logs/**,**/Packages/**,**/*.csproj,**/*.dll,**/*.Editor.cs"

      - name: SonarCloud End
        shell: powershell
        run: |
          dotnet-sonarscanner end `
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
